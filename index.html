<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الدعم الفني — الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d1a;--side:#0f1220;--main:#111425;
  --card:#161929;--card2:#1c2035;
  --v:#7c3aed;--n:#06b6d4;--g:#10b981;--r:#ef4444;--a:#f59e0b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}

/* ══ LAYOUT ══ */
.shell{display:flex;height:100vh;overflow:hidden}

/* ══ SIDEBAR ══ */
.side{
  width:300px;flex-shrink:0;
  background:var(--side);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}

.side-head{
  padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(180deg,rgba(124,58,237,.12) 0%,transparent 100%)}
.side-title{font-size:16px;font-weight:900;margin-bottom:2px;
  background:linear-gradient(90deg,#fff,var(--n));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.side-sub{font-size:11px;color:var(--t3)}

.search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search{
  width:100%;background:var(--card2);border:1px solid var(--border2);
  border-radius:10px;color:var(--t1);font-family:'Tajawal',sans-serif;
  font-size:13px;padding:8px 12px;outline:none;
  transition:border-color .2s}
.search::placeholder{color:var(--t3)}
.search:focus{border-color:rgba(124,58,237,.4)}

.sessions-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,.2) transparent}
.sessions-list::-webkit-scrollbar{width:3px}
.sessions-list::-webkit-scrollbar-thumb{background:rgba(124,58,237,.2);border-radius:3px}

.sess-item{
  padding:13px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:10px;
  position:relative}
.sess-item:hover{background:rgba(255,255,255,.03)}
.sess-item.active{background:rgba(124,58,237,.1);border-right:3px solid var(--v)}

.sess-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--v),var(--n));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;border:2px solid rgba(124,58,237,.3)}
.sess-info{flex:1;min-width:0}
.sess-id{font-size:12px;font-weight:700;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.sess-preview{font-size:11px;color:var(--t3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sess-time{font-size:10px;color:var(--t3)}
.sess-badge{
  background:var(--v);color:#fff;font-size:9px;font-weight:800;
  border-radius:50px;padding:1px 6px;min-width:16px;text-align:center}

.empty-side{text-align:center;padding:40px 16px;color:var(--t3);font-size:13px}

/* ══ MAIN AREA ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--main)}

/* no selection state */
.no-sel{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;color:var(--t3)}
.no-sel .icon{font-size:52px;opacity:.25}
.no-sel p{font-size:14px}

/* chat header */
.chat-hdr{
  flex-shrink:0;padding:13px 18px;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px}
.chat-hdr-av{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--v),var(--n));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;border:2px solid rgba(124,58,237,.3);flex-shrink:0}
.chat-hdr-info{flex:1}
.chat-hdr-name{font-size:14px;font-weight:800}
.chat-hdr-sub{font-size:11px;color:var(--t3)}
.chat-hdr-actions{display:flex;gap:8px}
.hdr-btn{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border2);
  background:var(--card2);color:var(--t2);font-family:'Tajawal',sans-serif;
  font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.hdr-btn:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.hdr-btn.danger:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}

/* messages */
.chat-msgs{
  flex:1;overflow-y:auto;padding:16px 20px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:rgba(124,58,237,.2) transparent}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(124,58,237,.2);border-radius:3px}

.date-sep{text-align:center;margin:4px 0}
.date-sep span{
  font-size:10px;color:var(--t3);background:var(--card);
  border:1px solid var(--border);border-radius:50px;padding:3px 10px;display:inline-block}

.mrow{display:flex;flex-direction:column;max-width:75%;animation:mIn .28s cubic-bezier(.16,1,.3,1) both}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mrow.user{align-self:flex-start;align-items:flex-start}
.mrow.agent{align-self:flex-end;align-items:flex-end}

.mtop{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.role-lbl{font-size:10px;color:var(--t3)}
.role-icon{font-size:12px}

.mbubble{
  padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.65;word-break:break-word}
.mrow.user .mbubble{
  background:var(--card2);border:1px solid var(--border2);
  border-bottom-left-radius:4px;color:var(--t1)}
.mrow.agent .mbubble{
  background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(6,182,212,.18));
  border:1px solid rgba(124,58,237,.25);
  border-bottom-right-radius:4px;color:#fff}

.mmeta{font-size:10px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:4px}
.agent-tick{color:var(--n);opacity:.8}

/* reply bar */
.reply-bar{
  flex-shrink:0;padding:12px 16px 16px;
  background:var(--card);border-top:1px solid var(--border)}
.reply-label{font-size:11px;color:var(--t3);margin-bottom:7px;
  display:flex;align-items:center;gap:5px}
.reply-label::before{content:'↩';color:var(--v);font-weight:900}
.reply-row{display:flex;gap:10px;align-items:flex-end}
.reply-ta{
  flex:1;background:var(--card2);border:1px solid var(--border2);
  border-radius:14px;color:var(--t1);font-family:'Tajawal',sans-serif;
  font-size:13px;line-height:1.55;padding:10px 14px;outline:none;
  resize:none;max-height:110px;min-height:42px;overflow-y:auto;
  transition:border-color .22s,box-shadow .22s;caret-color:var(--n);scrollbar-width:none}
.reply-ta::-webkit-scrollbar{display:none}
.reply-ta::placeholder{color:var(--t3)}
.reply-ta:focus{border-color:rgba(124,58,237,.4);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.send-btn{
  width:42px;height:42px;border-radius:50%;border:none;flex-shrink:0;
  background:linear-gradient(135deg,var(--v),#4f46e5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(124,58,237,.4);transition:all .22s;overflow:hidden;position:relative}
.send-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);
  transform:translateX(-120%);transition:transform .5s}
.send-btn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 6px 22px rgba(124,58,237,.6)}
.send-btn:hover:not(:disabled)::before{transform:translateX(120%)}
.send-btn:active:not(:disabled){transform:scale(.94)}
.send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sbspin{display:none;width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,.2);border-top-color:#fff;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ STATS BAR ══ */
.stats-bar{
  display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--card)}
.stat{
  flex:1;padding:10px 12px;text-align:center;border-left:1px solid var(--border);
  transition:background .2s}
.stat:last-child{border-left:none}
.stat-n{font-size:18px;font-weight:900;margin-bottom:1px}
.stat-l{font-size:10px;color:var(--t3)}
.stat-n.purple{background:linear-gradient(90deg,var(--v),var(--n));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-n.green{color:var(--g)}
.stat-n.amber{color:var(--a)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);z-index:99;
  padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;
  backdrop-filter:blur(18px);opacity:0;
  transition:all .3s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:7px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.28);color:#6ee7b7}
.toast.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.28);color:#fca5a5}
.toast.info{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.28);color:#c4b5fd}

/* loading */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;height:54px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* refresh btn */
.refresh-btn{
  margin:10px 14px 0;padding:7px;border-radius:8px;border:1px dashed rgba(124,58,237,.25);
  background:transparent;color:var(--t3);font-family:'Tajawal',sans-serif;font-size:11px;
  cursor:pointer;transition:all .2s;width:calc(100% - 28px);display:flex;align-items:center;justify-content:center;gap:5px}
.refresh-btn:hover{background:rgba(124,58,237,.08);color:var(--t1);border-color:rgba(124,58,237,.4)}

/* scrollbar global */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* responsive */
@media(max-width:640px){
  .side{width:240px}
  .chat-hdr-actions .hdr-btn span{display:none}
}
@media(max-width:480px){
  .shell{flex-direction:column}
  .side{width:100%;height:220px;border-left:none;border-bottom:1px solid var(--border)}
  .sessions-list{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden}
  .sess-item{min-width:160px;border-bottom:none;border-left:1px solid var(--border)}
  .sess-item.active{border-right:none;border-top:3px solid var(--v)}
  .search-wrap{display:none}
}
</style>
</head>
<body>

<div class="shell">

  <!-- ══ SIDEBAR ══ -->
  <div class="side">
    <div class="side-head">
      <div class="side-title">🎮 لوحة الدعم الفني</div>
      <div class="side-sub">إدارة محادثات العملاء</div>
    </div>

    <div class="search-wrap">
      <input class="search" id="searchInput" placeholder="🔍 بحث في المحادثات..." oninput="filterSessions()">
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-n purple" id="statTotal">—</div><div class="stat-l">محادثة</div></div>
      <div class="stat"><div class="stat-n amber" id="statOpen">—</div><div class="stat-l">بانتظار رد</div></div>
      <div class="stat"><div class="stat-n green" id="statReplied">—</div><div class="stat-l">تم الرد</div></div>
    </div>

    <button class="refresh-btn" onclick="loadSessions()">↻ تحديث القائمة</button>

    <div class="sessions-list" id="sessionsList">
      <div style="padding:20px 14px;display:flex;flex-direction:column;gap:8px">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton" style="height:40px"></div>
      </div>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <div class="main" id="main">
    <div class="no-sel" id="noSel">
      <div class="icon">💬</div>
      <p>اختر محادثة من القائمة للبدء</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ════ SUPABASE ════ */
const db = supabase.createClient(
  'https://lckwwtfqaiihaqlwvbiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxja3d3dGZxYWlpaGFxbHd2Yml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTkzODUsImV4cCI6MjA5MTczNTM4NX0.uN_1oKSTCIrnGwCdPz41x20xnMb4CyKXoTqYXO9vbTE'
);

let allSessions = [];
let activeSid   = null;
let sending     = false;

/* ════ HELPERS ════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function fmtTime(ts){
  return new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})
}
function fmtDate(ts){
  const d=new Date(ts), today=new Date();
  if(d.toDateString()===today.toDateString()) return 'اليوم';
  const y=new Date(today); y.setDate(today.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'أمس';
  return d.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'short'});
}
function relativeTime(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return 'الآن';
  if(m<60) return `منذ ${m} د`;
  const h=Math.floor(m/60);
  if(h<24) return `منذ ${h} س`;
  return `منذ ${Math.floor(h/24)} ي`;
}

function showToast(msg, type='ok'){
  const t=document.getElementById('toast');
  const ic={ok:'✓',err:'✕',info:'ℹ'};
  t.innerHTML=`<span>${ic[type]||'•'}</span><span>${msg}</span>`;
  t.className=`toast ${type} on`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),3000);
}

function scrollChatBottom(){
  const el=document.getElementById('chatMsgs');
  if(el) el.scrollTop=el.scrollHeight;
}

function resizeTA(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,110)+'px';
}

/* ════ LOAD ALL SESSIONS ════ */
async function loadSessions(){
  const list=document.getElementById('sessionsList');
  list.innerHTML=`<div style="padding:16px 14px;display:flex;flex-direction:column;gap:8px">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton" style="height:38px"></div></div>`;

  try {
    const { data, error } = await db
      .from('chat_sessions')
      .select('*')
      .order('updated_at',{ascending:false});

    if(error) throw error;

    allSessions = data || [];
    renderSessionList(allSessions);
    updateStats(allSessions);

  } catch(e){
    list.innerHTML=`<div class="empty-side">⚠️ خطأ في التحميل<br><small style="color:#64748b">${esc(e.message||'')}</small></div>`;
    console.error(e);
  }
}

function updateStats(sessions){
  const total=sessions.length;
  let open=0, replied=0;
  sessions.forEach(s=>{
    const msgs=Array.isArray(s.messages)?s.messages:[];
    const last=msgs[msgs.length-1];
    if(!last || last.role==='user') open++;
    else replied++;
  });
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statOpen').textContent=open;
  document.getElementById('statReplied').textContent=replied;
}

function renderSessionList(sessions){
  const list=document.getElementById('sessionsList');
  if(!sessions.length){
    list.innerHTML='<div class="empty-side">📭 لا توجد محادثات بعد</div>';
    return;
  }
  list.innerHTML='';
  sessions.forEach((s,i)=>{
    const msgs=Array.isArray(s.messages)?s.messages:[];
    const last=msgs[msgs.length-1];
    const lastText=last?last.text:'لا توجد رسائل';
    const hasUnread=last&&last.role==='user';
    const userMsgsCount=msgs.filter(m=>m.role==='user').length;

    // short display id
    const shortId=s.session_id.replace('u_','').slice(0,10)+'…';

    const item=document.createElement('div');
    item.className=`sess-item${activeSid===s.session_id?' active':''}`;
    item.dataset.sid=s.session_id;
    item.style.animationDelay=(i*.04)+'s';
    item.innerHTML=`
      <div class="sess-av">${s.session_id.slice(-1).toUpperCase()}</div>
      <div class="sess-info">
        <div class="sess-id">مستخدم #${i+1}</div>
        <div class="sess-preview">${esc(lastText.slice(0,40))}${lastText.length>40?'…':''}</div>
      </div>
      <div class="sess-meta">
        <div class="sess-time">${relativeTime(s.updated_at)}</div>
        ${hasUnread?`<div class="sess-badge">${userMsgsCount}</div>`:''}
      </div>`;

    item.onclick=()=>openSession(s.session_id);
    list.appendChild(item);
  });
}

function filterSessions(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){ renderSessionList(allSessions); return; }
  const filtered=allSessions.filter(s=>{
    const msgs=Array.isArray(s.messages)?s.messages:[];
    return msgs.some(m=>m.text&&m.text.toLowerCase().includes(q)) ||
           s.session_id.toLowerCase().includes(q);
  });
  renderSessionList(filtered);
}

/* ════ OPEN SESSION ════ */
function openSession(sid){
  activeSid=sid;
  // highlight active
  document.querySelectorAll('.sess-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.sid===sid);
  });

  const session=allSessions.find(s=>s.session_id===sid);
  if(!session) return;

  const msgs=Array.isArray(session.messages)?session.messages:[];
  const lastMsg=msgs[msgs.length-1];
  const userCount=msgs.filter(m=>m.role==='user').length;
  const lastUpdate=new Date(session.updated_at).toLocaleString('ar-EG');
  const shortNum=allSessions.indexOf(session)+1;

  const main=document.getElementById('main');
  main.innerHTML=`
    <!-- Chat Header -->
    <div class="chat-hdr">
      <div class="chat-hdr-av">${sid.slice(-1).toUpperCase()}</div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-name">مستخدم #${shortNum}</div>
        <div class="chat-hdr-sub">${userCount} رسالة · آخر نشاط: ${relativeTime(session.updated_at)}</div>
      </div>
      <div class="chat-hdr-actions">
        <button class="hdr-btn" onclick="refreshSession('${sid}')">↻ <span>تحديث</span></button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-msgs" id="chatMsgs"></div>

    <!-- Reply Bar -->
    <div class="reply-bar">
      <div class="reply-label">رد من فريق الدعم</div>
      <div class="reply-row">
        <textarea class="reply-ta" id="replyTA" placeholder="اكتب ردك هنا..." rows="1"
          oninput="resizeTA(this)"
          onkeydown="if(event.ctrlKey&&event.key==='Enter'){event.preventDefault();submitReply()}"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="submitReply()">
          <svg id="sendIco" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <div class="sbspin" id="sbspin"></div>
        </button>
      </div>
    </div>`;

  renderMessages(msgs);
}

/* ════ RENDER MESSAGES ════ */
function renderMessages(msgs){
  const container=document.getElementById('chatMsgs');
  if(!container) return;
  container.innerHTML='';
  if(!msgs.length){
    container.innerHTML='<div style="text-align:center;color:#475569;font-size:13px;padding:30px">لا توجد رسائل بعد</div>';
    return;
  }

  let lastDate='';
  msgs.forEach(m=>{
    const d=fmtDate(m.ts);
    if(d!==lastDate){
      lastDate=d;
      const sep=document.createElement('div');
      sep.className='date-sep'; sep.innerHTML=`<span>${d}</span>`;
      container.appendChild(sep);
    }
    const isAgent=m.role==='agent';
    const row=document.createElement('div');
    row.className=`mrow ${m.role==='user'?'user':'agent'}`;
    row.style.animation='none'; // no animation for history
    row.innerHTML=`
      <div class="mtop">
        <span class="role-icon">${isAgent?'🎧':'👤'}</span>
        <span class="role-lbl">${isAgent?'فريق الدعم':'العميل'}</span>
      </div>
      <div class="mbubble">${esc(m.text)}</div>
      <div class="mmeta">${fmtTime(m.ts)}${isAgent?'<span class="agent-tick">✓✓</span>':''}</div>`;
    container.appendChild(row);
  });

  scrollChatBottom();
}

/* ════ REFRESH SINGLE SESSION ════ */
async function refreshSession(sid){
  try {
    const { data, error }=await db.from('chat_sessions').select('*').eq('session_id',sid).single();
    if(error) throw error;
    // update in allSessions
    const idx=allSessions.findIndex(s=>s.session_id===sid);
    if(idx>-1) allSessions[idx]=data;
    const msgs=Array.isArray(data.messages)?data.messages:[];
    renderMessages(msgs);
    showToast('تم التحديث','ok');
  } catch(e){
    showToast('خطأ: '+(e.message||''),'err');
  }
}

/* ════ SUBMIT REPLY ════ */
async function submitReply(){
  if(sending||!activeSid) return;
  const ta=document.getElementById('replyTA');
  const text=ta.value.trim();
  if(!text){ ta.focus(); showToast('اكتب ردك أولاً','err'); return; }

  sending=true;
  const btn=document.getElementById('sendBtn');
  const ico=document.getElementById('sendIco');
  const sp=document.getElementById('sbspin');
  btn.disabled=true; ico.style.display='none'; sp.style.display='block';

  try {
    // get latest from DB
    const { data: fresh, error: fetchErr }=await db
      .from('chat_sessions').select('messages').eq('session_id',activeSid).single();
    if(fetchErr) throw fetchErr;

    const existingMsgs=Array.isArray(fresh.messages)?fresh.messages:[];
    const agentMsg={ role:'agent', text, ts:Date.now() };
    const updatedMsgs=[...existingMsgs, agentMsg];

    const { error: saveErr }=await db
      .from('chat_sessions')
      .update({ messages:updatedMsgs, updated_at:new Date().toISOString() })
      .eq('session_id',activeSid);

    if(saveErr) throw saveErr;

    // update local cache
    const idx=allSessions.findIndex(s=>s.session_id===activeSid);
    if(idx>-1) allSessions[idx].messages=updatedMsgs;

    // render new message with animation
    const container=document.getElementById('chatMsgs');
    const row=document.createElement('div');
    row.className='mrow agent';
    row.innerHTML=`
      <div class="mtop"><span class="role-icon">🎧</span><span class="role-lbl">فريق الدعم</span></div>
      <div class="mbubble">${esc(text)}</div>
      <div class="mmeta">${fmtTime(Date.now())}<span class="agent-tick">✓✓</span></div>`;
    container.appendChild(row);
    scrollChatBottom();

    ta.value=''; ta.style.height='auto';
    showToast('تم إرسال الرد ✓','ok');

    // update sidebar
    renderSessionList(allSessions);
    updateStats(allSessions);
    // re-highlight active
    document.querySelectorAll('.sess-item').forEach(el=>{
      el.classList.toggle('active', el.dataset.sid===activeSid);
    });

  } catch(e){
    const m=[e.message,e.details,e.hint].filter(Boolean).join(' ')||JSON.stringify(e);
    showToast('خطأ: '+m,'err');
    console.error(e);
  } finally {
    sending=false; btn.disabled=false; ico.style.display='block'; sp.style.display='none';
  }
}

/* ════ AUTO REFRESH every 30s ════ */
setInterval(()=>{
  loadSessions();
  if(activeSid) refreshSession(activeSid);
}, 30000);

/* ════ INIT ════ */
loadSessions();
</script>
